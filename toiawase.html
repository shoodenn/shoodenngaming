<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ - しょーでんゲーミング</title>
<style>
    /* 全体の設定（プライバシーポリシーと統一） */
    body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        line-height: 1.8;
        color: #333;
        background-color: #f4f6f9;
        padding: 20px;
        margin: 0;
    }

    /* フォームの枠の設定 */
    .form-container {
        max-width: 600px; /* 少しスリムに */
        margin: 0 auto;
        background: #ffffff;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    h1 {
        font-size: 28px;
        text-align: center;
        border-bottom: 3px solid #00b4d8;
        padding-bottom: 15px;
        margin-bottom: 30px;
    }

    /* 入力エリアの設定 */
    .form-group {
        margin-bottom: 20px;
    }
    label {
        display: block;
        font-weight: bold;
        margin-bottom: 8px;
        color: #555;
    }
    input[type="text"],
    input[type="email"],
    textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box; /* 枠からはみ出さないように */
        font-family: inherit;
    }
    textarea {
        height: 150px;
        resize: vertical; /* 縦方向のみリサイズ可能に */
    }

    /* ボタンの設定 */
    .btn {
        display: inline-block;
        padding: 12px 24px;
        color: #fff;
        background-color: #00b4d8;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        text-align: center;
        width: 100%;
        transition: background-color 0.3s;
    }
    .btn:hover {
        background-color: #0096b4;
    }
    .btn-back {
        background-color: #999;
        margin-bottom: 10px;
    }
    .btn-back:hover {
        background-color: #777;
    }

    /* 確認画面用のテキスト設定 */
    .confirm-text {
        background-color: #f9f9f9;
        padding: 15px;
        border: 1px solid #eee;
        border-radius: 4px;
        margin-bottom: 20px;
        white-space: pre-wrap; /* 改行を反映させる */
        word-wrap: break-word;
    }
</style>
</head>
<body>

<div class="form-container">
    <h1>お問い合わせ</h1>

    <form id="contactForm" action="https://formspree.io/f/maqkzogg" method="POST">
        
        <div id="inputSection">
            <p style="font-size: 14px; color: #666; margin-bottom: 20px;">
                ゲーミングPCに関するご質問など、お気軽にお問い合わせください。<br>
                ※(*)は必須項目です。
            </p>

            <div class="form-group">
                <label for="name">お名前 (*)</label>
                <input type="text" id="name" name="name" required placeholder="しょーでん 太郎">
            </div>

            <div class="form-group">
                <label for="email">メールアドレス (*)</label>
                <input type="email" id="email" name="email" required placeholder="example@gmail.com">
            </div>

            <div class="form-group">
                <label for="message">お問い合わせ内容 (*)</label>
                <textarea id="message" name="message" required placeholder="ご質問やご相談内容をご記入ください。"></textarea>
            </div>

            <button type="button" class="btn" onclick="showConfirm()">確認画面へ</button>
        </div>


        <div id="confirmSection" style="display: none;">
            <p style="font-weight: bold; color: #d9534f;">以下の内容で送信します。よろしいですか？</p>

            <div class="form-group">
                <label>お名前</label>
                <div class="confirm-text" id="confirmName"></div>
            </div>

            <div class="form-group">
                <label>メールアドレス</label>
                <div class="confirm-text" id="confirmEmail"></div>
            </div>

            <div class="form-group">
                <label>お問い合わせ内容</label>
                <div class="confirm-text" id="confirmMessage"></div>
            </div>

            <button type="button" class="btn btn-back" onclick="hideConfirm()">入力画面に戻る</button>
            <button type="submit" class="btn">この内容で送信する</button>
        </div>

    </form>
</div>

<script>
    // 確認画面を表示する関数
    function showConfirm() {
        // 入力された値を取得
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const message = document.getElementById('message').value;

        // 必須項目が入力されているか簡易チェック
        if (!name || !email || !message) {
            alert('すべての項目を入力してください。');
            return;
        }

        // 確認画面に値をセット
        document.getElementById('confirmName').textContent = name;
        document.getElementById('confirmEmail').textContent = email;
        document.getElementById('confirmMessage').textContent = message;

        // 入力画面を隠して、確認画面を表示
        document.getElementById('inputSection').style.display = 'none';
        document.getElementById('confirmSection').style.display = 'block';
    }

    // 入力画面に戻る関数
    function hideConfirm() {
        // 確認画面を隠して、入力画面を表示
        document.getElementById('confirmSection').style.display = 'none';
        document.getElementById('inputSection').style.display = 'block';
    }
</script>

</body>
</html>
